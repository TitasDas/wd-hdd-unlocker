name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux binary
        run: ./scripts/build-linux.sh

      - name: Prepare release assets
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release
          cp dist/wd-security "release/wd-hdd-unlocker-linux-x86_64"
          chmod +x "release/wd-hdd-unlocker-linux-x86_64"
          tar -C release -czf "release/wd-hdd-unlocker-linux-x86_64.tar.gz" wd-hdd-unlocker-linux-x86_64
          cd release
          sha256sum wd-hdd-unlocker-linux-x86_64 wd-hdd-unlocker-linux-x86_64.tar.gz > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/wd-hdd-unlocker-linux-x86_64
            release/wd-hdd-unlocker-linux-x86_64.tar.gz
            release/SHA256SUMS.txt
          generate_release_notes: true
